<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Support Cases</title>

  <!-- Roboto like Google UI -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --text:#202124;
      --muted:#5f6368;
      --line:#dadce0;

      --blue:#1a73e8;
      --blue-bg:#e8f0fe;

      --red:#d93025;
      --red-bg:#fce8e6;

      --search-bg:#f1f3f4;
      --row-bg:#f8f9fa;
      --hover-bg:#f1f3f4;
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      font-family: Roboto, Arial, sans-serif;
      color:var(--text);
      background:#fff;
    }

    /* page width like screenshot */
    .wrap{
      max-width: 960px;
      margin: 10px auto 48px;
      padding: 0 16px;
    }

    /* header */
    .topbar{
      display:flex;
      align-items:center;
      gap:12px;
      padding: 6px 0 10px;
    }
    .back{
      width:32px;height:32px;
      border-radius:999px;
      border:0;
      background:transparent;
      cursor:pointer;
      display:grid;
      place-items:center;
      color:var(--muted);
      transition: background .15s ease;
    }
    .back:hover{ background: var(--hover-bg); }
    .title{
      font-size:18px;
      font-weight:500;
      letter-spacing:0;
      line-height:24px;
    }
    .page-divider{
      height:1px;
      background:#e0e0e0;
      margin: 8px 0 6px;
    }

    /* tabs */
    .tabs{
      display:flex;
      gap:18px;
      border-bottom:1px solid #e0e0e0;
      margin-bottom: 12px;
    }
    .tab{
      border:0;
      background:transparent;
      padding: 10px 10px 10px; /* add side padding for hover area */
      font-size:13px;
      color:#5f6368;
      cursor:pointer;
      position:relative;
      font-weight:400;
      border-radius:8px;
      transition: background .15s ease, color .15s ease;
    }
    .tab:hover{
      background: var(--hover-bg);
    }
    .tab:focus-visible{
      outline:2px solid #c6dafc;
      outline-offset:2px;
      background: var(--hover-bg);
    }
    .tab[aria-selected="true"]{
      color:#1a73e8;
      font-weight:500;
    }
    .tab[aria-selected="true"]::after{
      content:"";
      position:absolute;
      left:10px; right:10px;   /* match hover padding */
      bottom:-1px;
      height:2px;
      background:#1a73e8;
      border-radius:2px 2px 0 0;
    }

    /* search */
    .searchRow{
      display:flex;
      align-items:center;
      gap:10px;
      background:#f1f3f4;
      border:1px solid #dadce0;
      border-radius:6px;
      padding: 8px 12px;
      margin: 10px 0 16px;
      transition: box-shadow .15s ease, background .15s ease;
    }
    .searchRow:hover{
      background:#eef0f1;
    }
    .searchRow:focus-within{
      background:#fff;
      box-shadow: 0 1px 2px rgba(0,0,0,.08);
    }
    .searchRow svg{ opacity:.7; }
    .search{
      width:100%;
      border:0;
      outline:none;
      background:transparent;
      font-size:14px;
      color:var(--text);
    }
    .search::placeholder{ color:#80868b; }

    /* card */
    .card{
      border:1px solid var(--line);
      border-radius:8px;
      overflow:hidden;
      background:#fff;
    }
    .card + .card{ margin-top:16px; }

    /* card header row */
    .cardHead{
      display:flex;
      justify-content:space-between;
      gap:12px;
      padding: 12px 14px;
      background:var(--row-bg);
      border-bottom:1px solid var(--line);
    }
    .headLeft{
      display:flex;
      align-items:flex-start;
      gap:12px;
      min-width:0;
    }
    .icon{
      width:32px;height:32px;
      border-radius:999px;
      background:#a52714;
      display:grid;
      place-items:center;
      flex:0 0 auto;
    }
    .icon svg{ color:#fff; }
    .caseTitle{
      font-size:14px;
      font-weight:500;
      margin:0 0 2px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .meta{
      font-size:12px;
      color:var(--muted);
    }

    /* chips */
    .badges{
      display:flex;
      gap:10px;
      align-items:flex-start;
      padding-top:2px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }
    .chip{
      font-size:11px;
      font-weight:700;
      letter-spacing:.2px;
      line-height:1;
      padding: 6px 10px;
      border-radius:999px;
      border:1px solid transparent;
      white-space:nowrap;
      user-select:none;
    }
    .chip.progress{
      color:var(--blue);
      background:var(--blue-bg);
      border-color:#d2e3fc;
    }
    .chip.open{
      color:var(--blue);
      background:var(--blue-bg);
      border-color:#d2e3fc;
    }
    .chip.urgent{
      color:var(--red);
      background:var(--red-bg);
      border-color:#fad2cf;
    }

    /* card content */
    .cardBody{
      padding: 12px 14px 0;
      font-size:13px;
      line-height:1.45;
    }
    .cardBody p{
      margin: 10px 0 0;
      color:var(--text);
    }
    .inner-divider{
      height:1px;
      background:var(--line);
      margin: 14px -14px 0;
    }

    /* doc row */
    .docRow{
      display:flex;
      gap:12px;
      align-items:flex-start;
      padding: 12px 14px;
      border-bottom:1px solid var(--line);
    }
    .docIcon{
      width:28px;height:28px;
      border-radius:4px;
      background:var(--red-bg);
      display:grid;
      place-items:center;
      color:#a52714;
      flex:0 0 auto;
      margin-top:2px;
    }
    .docTitle{
      font-size:13px;
      font-weight:500;
      margin:0 0 2px;
    }
    .docMeta{
      font-size:12px;
      color:var(--muted);
    }

    /* footer buttons row */
    .cardFoot{
      background:var(--row-bg);
      padding: 12px 14px;
      display:flex;
      justify-content:flex-end;
      gap:10px;
    }
    .btn{
      border-radius:4px;
      padding: 8px 14px;
      font-size:13px;
      font-weight:500;
      cursor:pointer;
      transition: background .15s ease, filter .15s ease;
    }
    .btn.secondary{
      border:1px solid #c6dafc;
      background:#fff;
      color:var(--blue);
    }
    .btn.secondary:hover{ background:#f8f9ff; }
    .btn.primary{
      border:1px solid var(--blue);
      background:var(--blue);
      color:#fff;
    }
    .btn.primary:hover{ filter:brightness(.97); }

    /* footer (privacy/terms/help/about) */
    .footer{
      margin-top: 28px;
      display:flex;
      justify-content:center;
      gap:14px;
      flex-wrap:wrap;
      font-size:12px;
      color:var(--muted);
    }
    .footer a{
      color:inherit;
      text-decoration:none;
    }
    .footer a:hover{ text-decoration:underline; }

    /* responsive */
    @media (max-width: 640px){
      .cardHead{ flex-direction:column; }
      .badges{ justify-content:flex-start; }
      .cardFoot{ justify-content:stretch; flex-direction:column; }
      .btn{ width:100%; }
      .inner-divider{ margin-left:-14px; margin-right:-14px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <button class="back" aria-label="Google Help" onclick="window.open('https://support.google.com/', '_blank')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <div class="title">Support Cases</div>
    </div>

    <div class="page-divider"></div>

    <div class="tabs" role="tablist" aria-label="Cases tabs">
      <button class="tab" role="tab" aria-selected="true"  data-tab="all">All cases</button>
      <button class="tab" role="tab" aria-selected="false" data-tab="open">Open</button>
      <button class="tab" role="tab" aria-selected="false" data-tab="progress">In progress</button>
      <button class="tab" role="tab" aria-selected="false" data-tab="resolved">Resolved</button>
      <button class="tab" role="tab" aria-selected="false" data-tab="closed">Closed</button>
    </div>

    <div class="searchRow" role="search">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M21 21l-4.3-4.3m1.8-5.2a7 7 0 11-14 0 7 7 0 0114 0z"
              stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <input class="search" id="q" placeholder="Search support cases" autocomplete="off" />
    </div>

    <div id="list"></div>

    <div class="footer">
  <a href="https://policies.google.com/privacy" target="_blank" rel="noopener">Privacy</a>
  <a href="https://policies.google.com/terms" target="_blank" rel="noopener">Terms</a>
  <a href="https://support.google.com/" target="_blank" rel="noopener">Help</a>
  <a href="https://about.google/" target="_blank" rel="noopener">About</a>
  <span>© <span id="year"></span> Google LLC</span>
</div>

  <script>
    const CASES = [
      {
        id: "YT-CP-2025-001",
        title: "Copyright Claim – Music Usage",
        opened: "March 4, 2026",
        status: "progress",
        urgent: true,
        p1: "A copyright complaint has been submitted regarding the use of licensed music in one of your YouTube videos.",
        p2: "The claimant alleges unauthorized use of protected audio content. Please review the complaint details and respond accordingly.",
        docTitle: "Complaint Submitted – Review Required",
        docMeta: "Action required: Review claim and respond"
      },
      {
        id: "YT-CP-2025-002",
        title: "Second Copyright Warning – Audio Track",
        opened: "March 4, 2026",
        status: "open",
        urgent: true,
        p1: "Another copyright warning has been issued for music usage on your YouTube channel.",
        p2: "Failure to respond may result in content removal or channel restrictions. Immediate review is recommended.",
        docTitle: "Formal Complaint Filed",
        docMeta: "Action required: Open and review complaint"
      }
    ];

    const elList = document.getElementById("list");
    const elQ = document.getElementById("q");
    document.getElementById("year").textContent = new Date().getFullYear();

    let activeTab = "all";

    function esc(s){
      return String(s)
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    function chipForStatus(status){
      if(status === "progress") return `<span class="chip progress">IN PROGRESS</span>`;
      if(status === "open") return `<span class="chip open">OPEN</span>`;
      if(status === "resolved") return `<span class="chip resolved">RESOLVED</span>`;
      if(status === "closed") return `<span class="chip closed">CLOSED</span>`;
      return "";
    }

    function upload(){
      window.open("https://drive.google.com/drive/my-drive", "_blank");
    }
    function viewCase(){
      window.open("https://google.com", "_blank");
    }

    function render(){
      const q = (elQ.value || "").trim().toLowerCase();

      const filtered = CASES.filter(c => {
        const inTab = (activeTab === "all") ? true : c.status === activeTab;
        if(!inTab) return false;
        if(!q) return true;
        const hay = `${c.title} ${c.id} ${c.opened} ${c.p1} ${c.p2} ${c.docTitle} ${c.docMeta}`.toLowerCase();
        return hay.includes(q);
      });

      if(filtered.length === 0){
        elList.innerHTML = `<div style="color:#5f6368;font-size:12px;margin-top:12px;">No cases found.</div>`;
        return;
      }

      elList.innerHTML = filtered.map(c => `
        <div class="card">
          <div class="cardHead">
            <div class="headLeft">
              <div class="icon" aria-hidden="true" title="Warning">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                  <path d="M12 7v7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                  <path d="M12 18h.01" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
                </svg>
              </div>
              <div style="min-width:0">
                <div class="caseTitle">${esc(c.title)}</div>
                <div class="meta">Internal Ref #${esc(c.id)} • Opened ${esc(c.opened)}</div>
              </div>
            </div>

            <div class="badges">
              ${chipForStatus(c.status)}
              ${c.urgent ? `<span class="chip urgent">URGENT</span>` : ``}
            </div>
          </div>

          <div class="cardBody">
            <p>${esc(c.p1)}</p>
            <p>${esc(c.p2)}</p>
            <div class="inner-divider"></div>
          </div>

          <div class="docRow">
            <div class="docIcon" aria-hidden="true">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                <path d="M14 2H7a2 2 0 00-2 2v16a2 2 0 002 2h10a2 2 0 002-2V8l-5-6z"
                      stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                <path d="M14 2v6h6" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
              </svg>
            </div>
            <div>
              <div class="docTitle">${esc(c.docTitle)}</div>
              <div class="docMeta">${esc(c.docMeta)}</div>
            </div>
          </div>

          <div class="cardFoot">
            <button class="btn secondary" onclick="upload()">Upload additional documents</button>
            <button class="btn primary" onclick="viewCase()">View case</button>
          </div>
        </div>
      `).join("");
    }

    document.querySelectorAll(".tab").forEach(btn=>{
      btn.addEventListener("click", ()=>{
        document.querySelectorAll(".tab").forEach(b=>b.setAttribute("aria-selected","false"));
        btn.setAttribute("aria-selected","true");
        activeTab = btn.dataset.tab;
        render();
      });
    });

    elQ.addEventListener("input", render);
    render();
  </script>
</body>
</html>
